# 业务配置模板
# 请根据你的实际情况填写此文件

# ═══════════════════════════════════════════════════════════════
# 公司基本信息
# ═══════════════════════════════════════════════════════════════

company:
  name: "你的公司名称"           # 例：XX婚纱布料有限公司
  product: "婚纱布料、蕾丝原料"  # 主营产品
  location: "你的所在地"         # 例：苏州、广州
  established_year: 2010        # 成立年份
  employee_count: 50            # 员工人数

# ═══════════════════════════════════════════════════════════════
# 产品优势 (用于联系策略生成)
# ═══════════════════════════════════════════════════════════════

value_proposition:
  advantages:
    - "源头工厂，价格优势"       # 例：没有中间商
    - "品质稳定，供应可靠"       # 例：多年老厂
    - "款式多样，支持定制"       # 例：100+款式
    - "批量优惠，账期灵活"       # 例：支持月结
    
  pain_points_you_solve:
    - "面料质量不稳定"
    - "交期延误"
    - "价格透明度低"
    - "起订量过高"

# ═══════════════════════════════════════════════════════════════
# 目标客户偏好
# ═══════════════════════════════════════════════════════════════

target_customer:
  preferred_regions:
    - 苏州虎丘    # 国内最大婚纱产地
    - 广州        # 婚纱批发中心
    - 潮州        # 外贸婚纱基地
    - 六安        # 新兴婚纱产业带
    - 厦门        # 高端婚纱定制
    
  preferred_company_size:
    min_employees: 10
    max_employees: 300
    
  preferred_business_types:
    - 婚纱制造厂
    - 礼服加工厂
    - 蕾丝加工厂
    - 婚纱工作室
    - 外贸婚纱企业

# ═══════════════════════════════════════════════════════════════
# 联系方式 (可选，用于生成签名)
# ═══════════════════════════════════════════════════════════════

contact:
  contact_person: "你的姓名"
  phone: "你的电话"
  wechat: "你的微信"
  email: "你的邮箱"
  website: "公司网站"