                script1: "您好我是婚纱蕾丝面料源头工厂想和贵司聊聊面料供应合作...",
                script2: "我们有多款婚纱蕾丝面料现货价格有竞争力可以先寄样...",
                script3: "新客户首单有优惠支持小批量起订...",
                bestTime: "工作日",
                followUp: "首次联系后2天跟进",
                notes: ""
            },
            {
                name: "六安美薇新娘婚纱礼服有限公司",
                type: "婚纱礼服制造",
                location: "六安市",
                phone: "181****3514",
                email: "",
                decisionMaker: "总经理/采购经理",
                score: 70,
                whyGood: "1. 六安婚纱产业带企业\n2. 新兴婚纱生产基地\n3. 采购需求稳定\n4. 决策链相对简单",
                valueProp: "1. 提供稳定婚纱蕾丝面料供应\n2. 价格优惠提升其利润\n3. 快速响应需求",
                strategy: "1. 电话直接联系\n2. 了解其婚纱款式和面料需求\n3. 提供样品和报价\n4. 建立长期合作关系",
                script1: "您好我是婚纱蕾丝面料厂想和贵司合作...",
                script2: "我们有多款婚纱蕾丝面料价格优惠品质稳定...",
                script3: "可以先寄样品给您看看...",
                bestTime: "工作日",
                followUp: "首次联系后2天跟进",
                notes: ""
            }
        ];

        function getPriorityClass(score) {
            if (score >= 80) return 'priority-high';
            if (score >= 70) return 'priority-medium';
            return 'priority-low';
        }

        function renderCards(filter = 'all') {
            const kanban = document.getElementById('kanban');
            let filtered = companies;
            
            if (filter === '苏州') {
                filtered = companies.filter(c => c.location.includes('苏州'));
            } else if (filter === '潮州') {
                filtered = companies.filter(c => c.location.includes('潮州'));
            } else if (filter === '六安') {
                filtered = companies.filter(c => c.location.includes('六安'));
            } else if (filter === 'high') {
                filtered = companies.filter(c => c.score >= 80);
            }
            
            kanban.innerHTML = filtered.map((company, index) => `
                <div class="card ${getPriorityClass(company.score)}" onclick="openModal(${companies.indexOf(company)})">
                    <div class="card-header">
                        <div class="company-name">${company.name}</div>
                        <div class="score">${company.score}</div>
                    </div>
                    <div class="company-type">${company.type}</div>
                    <div class="location">${company.location}</div>
                    <div class="contact-info">
                        ${company.phone ? `<div class="contact-item"><span class="icon">📞</span>${company.phone}</div>` : ''}
                        ${company.email ? `<div class="contact-item"><span class="icon">📧</span>${company.email}</div>` : ''}
                        <div class="contact-item"><span class="icon">👤</span>${company.decisionMaker}</div>
                    </div>
                    <div class="tags">
                        <span class="tag">${company.bestTime}</span>
                    </div>
                </div>
            `).join('');
            
            updateStats(filtered);
        }

        function updateStats(filtered) {
            document.getElementById('total-count').textContent = filtered.length;
            const avgScore = Math.round(filtered.reduce((sum, c) => sum + c.score, 0) / filtered.length);
            document.getElementById('avg-score').textContent = avgScore;
            document.getElementById('high-priority').textContent = filtered.filter(c => c.score >= 80).length;
        }

        function openModal(index) {
            const company = companies[index];
            const modal = document.getElementById('modal');
            
            document.getElementById('modal-title').textContent = company.name;
            document.getElementById('modal-type').textContent = company.type;
            document.getElementById('modal-location').textContent = '📍 ' + company.location;
            document.getElementById('modal-score').textContent = '优先评分: ' + company.score;
            
            document.getElementById('modal-body').innerHTML = `
                <div class="info-grid">
                    <div class="info-item">
                        <div class="label">联系电话</div>
                        <div class="value">${company.phone || '暂无'}</div>
                    </div>
                    <div class="info-item">
                        <div class="label">联系邮箱</div>
                        <div class="value">${company.email || '暂无'}</div>
                    </div>
                    <div class="info-item">
                        <div class="label">决策人角色</div>
                        <div class="value">${company.decisionMaker}</div>
                    </div>
                    <div class="info-item">
                        <div class="label">最佳联系时间</div>
                        <div class="value">${company.bestTime}</div>
                    </div>
                    <div class="info-item">
                        <div class="label">跟进频率</div>
                        <div class="value">${company.followUp}</div>
                    </div>
                    ${company.website ? `
                    <div class="info-item">
                        <div class="label">公司网站</div>
                        <div class="value"><a href="${company.website}" target="_blank">${company.website}</a></div>
                    </div>
                    ` : ''}
                </div>
                
                <div class="section">
                    <div class="section-title">为什么是好客户</div>
                    <div class="section-content">${company.whyGood}</div>
                </div>
                
                <div class="section">
                    <div class="section-title">价值主张</div>
                    <div class="section-content">${company.valueProp}</div>
                </div>
                
                <div class="section">
                    <div class="section-title">联系策略</div>
                    <div class="section-content">${company.strategy}</div>
                </div>
                
                <div class="section">
                    <div class="section-title">开场白话术</div>
                    <div class="scripts-container">
                        <div class="script-card">
                            <div class="label">开场白 1</div>
                            <div class="content">${company.script1}</div>
                        </div>
                        <div class="script-card">
                            <div class="label">开场白 2</div>
                            <div class="content">${company.script2}</div>
                        </div>
                        <div class="script-card">
                            <div class="label">开场白 3</div>
                            <div class="content">${company.script3}</div>
                        </div>
                    </div>
                </div>
                
                ${company.notes ? `
                <div class="section">
                    <div class="section-title">备注</div>
                    <div class="section-content">${company.notes}</div>
                </div>
                ` : ''}
            `;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderCards(this.dataset.filter);
            });
        });

        renderCards();
    </script>
</body>
</html>
